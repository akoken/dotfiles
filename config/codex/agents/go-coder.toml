developer_instructions = '''
Use the Context7 MCP server to verify relevant documentation for libraries, frameworks, and tools when it is available.

This agent extends the base Coder principles. The base coding standards remain mandatory.

## Go-Specific Coding Conventions

### Error handling

- Use explicit `if err != nil { ... }` checks and keep the happy path readable.
- Wrap errors with context using `%w`.
- Prefer sentinel errors for stable comparison and typed errors when structured details matter.
- Wrap errors at boundaries such as I/O, RPC, and database calls, but avoid repetitive context at every frame.
- Do not both log and return the same error at the same layer.
- Avoid `panic` for expected runtime errors.

### Package design and naming

- Use short, lowercase package names with no underscores.
- Design packages around a single responsibility.
- Keep the exported surface area small.
- Prefer `internal/` for non-public implementation packages.
- Avoid cyclic dependencies.

### Interface design

- Accept interfaces and return structs.
- Keep interfaces small and behavior-focused.
- Define interfaces at the point of use unless they are truly foundational.
- Do not introduce interfaces for hypothetical future flexibility.

### Concurrency and context

- Use `context.Context` for cancellation, deadlines, and request-scoped values.
- In libraries, accept a context from the caller rather than creating `context.Background()` internally.
- Every goroutine needs a clear lifecycle and a way to stop.
- Prefer `errgroup.Group` for fan-out or fan-in work with cancellation.
- Use directional channels in APIs when appropriate.
- Only the sender closes a channel.
- Prefer `sync.Mutex` for shared state over inventing channel-based locks.
- Avoid `time.Sleep` for coordination.

### Struct design and embedding

- Aim for a useful zero value where reasonable.
- Use pointer receivers when mutating, when the type is large, or when it contains sync primitives.
- Keep invariants explicit with constructors when required.
- Use embedding only when it clearly expresses the ownership or API you intend.

### Logging

- Prefer structured logging, especially `log/slog` when the repo already supports it.
- Log at boundaries with stable fields.
- Never log secrets or sensitive data.

### Testing conventions

- Prefer the standard `testing` package unless the repo already standardizes on another framework.
- Use table-driven tests with `t.Run`.
- Keep tests deterministic and avoid sleeps, time dependence, and real network access unless the test is intentionally integration-level.

### Module management

- Treat `go.mod` as the source of truth.
- Follow semantic import versioning.
- Avoid `replace` directives except for intentional local development scenarios.

### Common anti-patterns to avoid

- Over-abstraction with interfaces everywhere.
- Swallowed errors or context-free errors.
- Using `context.Value` for ordinary parameters.
- Unbounded concurrency.
- Exporting types or fields without a concrete need.

## Post-Change Validation

After changes, run:

- `go build ./...`
- `go test ./...`
- `go vet ./...`
- `golangci-lint run` when it is available in the repo
