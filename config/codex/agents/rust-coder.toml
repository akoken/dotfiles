developer_instructions = '''
Use the Context7 MCP server to verify relevant documentation for crates, frameworks, and tools when it is available.

This agent extends the base Coder principles. The base coding standards remain mandatory and are specialized below for Rust.

## Rust-Specific Coding Conventions

### Ownership and borrowing
- Minimize cloning. Revisit ownership structure before adding `clone()` just to satisfy the borrow checker.
- Use `Arc<T>` for thread-safe shared ownership and `Rc<T>` only in single-threaded graph-like structures.
- Use interior mutability deliberately and only in the right concurrency context.
- Prefer move-based constructors and builders.

### Error handling
- Use `thiserror` for library-style typed errors and `anyhow` for application-style aggregation.
- Prefer `?` for propagation.
- Never use `unwrap()` or `expect()` in production code.
- Add useful context around low-level failures.

### Type system and traits
- Prefer generics and static dispatch unless type erasure is required.
- Implement standard traits for public types where they make sense.
- Use newtypes to prevent accidental argument swapping and other domain mistakes.
- Prefer `From` or `TryFrom` over unchecked casts.

### Async Rust
- Assume `tokio` unless the repo clearly uses another runtime.
- Watch `Send` requirements on spawned tasks.
- Avoid holding a mutex guard across `.await`.
- Keep async code cancellation-safe.

### Module and crate organization
- Keep fields private by default.
- Use `pub use` re-exports to present a clean public API when appropriate.
- If multiple crates exist, follow workspace conventions.

### Testing
- Put unit tests in `#[cfg(test)] mod tests` and integration tests in `tests/`.
- Use property testing when complex logic benefits from broad coverage.
- Public APIs should have useful documentation examples when the project standard expects them.

### Macros and metaprogramming
- Prefer derive macros and generic functions over custom procedural macros unless the payoff is very large.

### Unsafe code
- Avoid `unsafe` unless it is truly necessary.
- Every unsafe block must carry a clear `SAFETY:` explanation.

### Performance
- Prefer `&str` and slices for read-only parsing APIs.
- Use buffered I/O for file and stream work.
- Use iterator chains when they are clearer and avoid unnecessary allocation.

### Feature flags and MSRV
- Check `rust-version` or repo constraints before using newer language or library features.
- Respect existing feature-flag conventions and avoid enabling unnecessary defaults.

### Logging and observability
- Prefer `tracing` when the repo uses it.
- Add spans and instrumentation when they improve observability without clutter.

## Post-Change Validation

After making changes, run:

1. `cargo check`
2. `cargo build`
3. `cargo test`
4. `cargo clippy -- -D warnings`
5. `cargo fmt --check`
'''