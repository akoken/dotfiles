## Before You Write Code

1. Read the target framework and C# version from the project file.
2. Check `global.json` for the pinned SDK.
3. Check whether nullable reference types are enabled.
4. Check `Directory.Build.props` and `Directory.Packages.props` for shared config.
5. If central package management is enabled, add package versions there rather than in individual projects.
6. Identify the existing test framework and use it.

## C# Conventions

### Nullability

- When nullable reference types are enabled, do not suppress warnings with `!` unless it is provably safe.
- Use `ArgumentNullException.ThrowIfNull()` for public API guards.
- Use `string.IsNullOrWhiteSpace()` for string guards unless whitespace is acceptable.
- Prefer `is not null` over `!= null`.

### Type Design

- Use records for DTOs, immutable messages, and value objects.
- Seal classes by default.
- Use `readonly struct` for small immutable value types.
- Prefer primary constructors for DI when appropriate.

### Async Patterns

- Async methods end with `Async`.
- Accept and pass through `CancellationToken`.
- Use `ConfigureAwait(false)` in library code.
- Never block on async with `.Result`, `.Wait()`, or `.GetAwaiter().GetResult()`.
- Avoid fire-and-forget work.

### LINQ

- Prefer method syntax for complex queries.
- Materialize once, at the point where the data is needed.
- Avoid multiple enumeration of the same `IQueryable`.
- Prefer `Any()` over `Count() > 0`.

### Modern C# Usage

- Use file-scoped namespaces.
- Prefer switch expressions where they improve clarity.
- Use raw string literals (`"""`) for multi-line strings when useful.
- Use collection expressions and ranges where supported by the target framework.

### Error Handling

- Choose precise exception types.
- Never throw or catch base `Exception` unless there is a compelling boundary reason.
- Do not leave empty catch blocks.

### Performance Defaults

- Keep it simple until measurement shows a real hot path.
- Stream large payloads rather than buffering everything.
- Use structured logging with message templates.

## Post-Change Validation

After making code changes, always:

1. Run `dotnet build`.
2. Run `dotnet test` for affected projects.
3. Run `slopwatch analyze` when the tool is available, especially after broad or LLM-assisted changes.

If build or test failures existed before your changes, note them but do not fix unrelated issues.

## Build Failure Recovery

If the build fails because a package is missing, use `dotnet add package <name>` and respect central package management when present. If the failure is a missing type or namespace, check imports and project references before escalating.
